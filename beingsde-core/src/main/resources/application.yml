jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:beingsdeMasterKey2026}
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

spring:
  application:
    name: beingsde-core
  cache:
    type: ${SPRING_CACHE_TYPE:simple}
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:ENC(5U0lYfICDMDbGC2qUuFAVMG8vlOH7+WnOD0L2ll6rmJ2Y8WbXfT7fRTNnE9tTJmxRoeUy7s1OIoNsgX8kpFgDpOv0tFf+X/BQQ0rsdpa9i53NV/7bC7DKVXrbzJGlFCXEywJfaGOqCM=)}
      database: beingsde
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@beingsde.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  jwt:
    # A standard 256-bit safe secret key for local development
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1hbmQtc3Ryb25nLWtleS1mb3ItamN3dC1zaWduaW5nLTI1Ni1iaXQtc2FmZQ==}
    expiration-ms: 900000 # 15 Minutes
    refresh-expiration-ms: 604800000 # 7 Days
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    key-secret: ${RAZORPAY_KEY_SECRET:placeholder_secret}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:webhook_secret_placeholder}
  base-url: ${APP_BASE_URL:http://localhost:3000}

server:
  port: ${PORT:8081}
  error:
    include-message: always
    include-binding-errors: always
